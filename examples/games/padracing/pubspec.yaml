name: padracing
resolution: workspace
description: A sample game featuring Flame and Forge2D for DartPad
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  collection: ^1.17.1
  flame: ^1.36.0
  flame_forge2d: ^0.19.2+5
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  url_launcher: ^6.1.11

dev_dependencies:
  flame_lint: ^1.4.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
